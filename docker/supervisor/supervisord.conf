[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
autostart=true
autorestart=true

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisord/nginx.err.log
stdout_logfile=/var/log/supervisord/nginx.out.log

[program:laravel-queue]
command=php /var/www/artisan queue:work --sleep=3 --tries=3
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisord/laravel-queue.err.log
stdout_logfile=/var/log/supervisord/laravel-queue.out.log

[program:laravel-cron]
command=cron -f
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisord/cron.err.log
stdout_logfile=/var/log/supervisord/cron.out.log